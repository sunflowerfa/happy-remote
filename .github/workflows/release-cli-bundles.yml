# GitHub Actions — happy-cli multi-platform bundle build farm
#
# 借用 GitHub 免费 macOS / Windows / Linux runner 编译 node-pty 并打包
# standalone bundle，产物直接发布到 GitHub Release。
#
# 触发：
#   - push tag `happy-cli-v*`（推荐：`git push github happy-cli-v1.1.10-beta.4`）
#   - workflow_dispatch（GitHub Actions UI 手动触发，输入 version）
#
# 不需要任何 secret —— GitHub 自动注入 GITHUB_TOKEN，对当前仓库有 write 权限
# 用来创建 Release 和上传 asset。
#
# 产物（上传到 https://github.com/sunflowerfa/happy-remote/releases/tag/<tag>）：
#   happy-cli-<ver>-macos-arm64.tar.gz
#   happy-cli-<ver>-macos-x64.tar.gz
#   happy-cli-<ver>-linux-x64.tar.gz
#   happy-cli-<ver>-windows-x64.zip

name: release-cli-bundles

on:
  push:
    tags:
      - "happy-cli-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (no v prefix), e.g. 1.1.10-beta.4"
        required: true
        type: string

permissions:
  contents: write  # softprops/action-gh-release needs this to create/edit Release + upload assets

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive.outputs.version }}
      tag: ${{ steps.derive.outputs.tag }}
    steps:
      - name: Derive version
        id: derive
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#happy-cli-v}"
          fi
          TAG="happy-cli-v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building ${TAG}"

  bundle:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,   os: linux,   arch: x64,   archive: tar }
          - { runner: macos-13,        os: macos,   arch: x64,   archive: tar }
          - { runner: macos-14,        os: macos,   arch: arm64, archive: tar }
          - { runner: windows-latest,  os: windows, arch: x64,   archive: zip }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace deps (compiles node-pty for this platform)
        run: pnpm install --frozen-lockfile

      - name: Build happy-cli
        run: pnpm --filter happy build

      - name: Verify node-pty native binding
        shell: bash
        run: |
          set -e
          NATIVE=$(find packages/happy-cli/node_modules/node-pty -name "*.node" -print -quit || true)
          if [ -z "$NATIVE" ]; then
            echo "ERROR: node-pty native binding not built — bundle would be broken on ${{ matrix.os }}-${{ matrix.arch }}."
            ls -la packages/happy-cli/node_modules/node-pty/build/Release/ 2>/dev/null || true
            exit 1
          fi
          echo "Found native binding: $NATIVE"

      - name: Stage bundle (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          STAGE="happy-cli-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "dist-release/${STAGE}"
          cp -R packages/happy-cli/dist            "dist-release/${STAGE}/dist"
          cp -R packages/happy-cli/bin             "dist-release/${STAGE}/bin"
          cp -R packages/happy-cli/scripts         "dist-release/${STAGE}/scripts"
          cp -R packages/happy-cli/tools           "dist-release/${STAGE}/tools" 2>/dev/null || true
          cp     packages/happy-cli/package.json   "dist-release/${STAGE}/package.json"
          cp     packages/happy-cli/README.md      "dist-release/${STAGE}/README.md" 2>/dev/null || true
          cp     LICENSE                            "dist-release/${STAGE}/LICENSE" 2>/dev/null || true
          # vendored node_modules（含 prebuilt node-pty）
          pnpm --filter happy deploy --prod --node-linker=hoisted "dist-release/${STAGE}-deploy"
          cp -R "dist-release/${STAGE}-deploy/node_modules" "dist-release/${STAGE}/"
          rm -rf "dist-release/${STAGE}-deploy"
          tar -czf "happy-cli-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" \
              -C dist-release "${STAGE}"
          ls -la "happy-cli-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"

      - name: Stage bundle (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          $STAGE = "happy-cli-$VERSION-windows-x64"
          New-Item -ItemType Directory -Path "dist-release\$STAGE" -Force | Out-Null
          Copy-Item -Recurse packages\happy-cli\dist     "dist-release\$STAGE\dist"
          Copy-Item -Recurse packages\happy-cli\bin      "dist-release\$STAGE\bin"
          Copy-Item -Recurse packages\happy-cli\scripts  "dist-release\$STAGE\scripts"
          if (Test-Path packages\happy-cli\tools) {
            Copy-Item -Recurse packages\happy-cli\tools  "dist-release\$STAGE\tools"
          }
          Copy-Item packages\happy-cli\package.json      "dist-release\$STAGE\package.json"
          if (Test-Path packages\happy-cli\README.md) {
            Copy-Item packages\happy-cli\README.md       "dist-release\$STAGE\README.md"
          }
          if (Test-Path LICENSE) {
            Copy-Item LICENSE                            "dist-release\$STAGE\LICENSE"
          }
          pnpm --filter happy deploy --prod --node-linker=hoisted "dist-release\$STAGE-deploy"
          Copy-Item -Recurse "dist-release\$STAGE-deploy\node_modules" "dist-release\$STAGE\node_modules"
          Remove-Item -Recurse -Force "dist-release\$STAGE-deploy"
          Compress-Archive -Path "dist-release\$STAGE\*" -DestinationPath "happy-cli-$VERSION-windows-x64.zip"
          Get-Item "happy-cli-$VERSION-windows-x64.zip"

      # softprops/action-gh-release@v2 自动创建 release（不存在时），上传 file，
      # 已存在同名 asset 会被覆盖。4 个 matrix job 都指向同一个 tag，互不冲突。
      - name: Publish asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          body: |
            happy CLI ${{ needs.prepare.outputs.version }}

            Standalone bundles for macOS arm64/x64, Linux x64, Windows x64.
            Each tarball/zip contains vendored `node_modules` with `node-pty`
            native binding precompiled for that platform — extract and run,
            no `npm install`, no compilation required.

            Install with one line:
            ```
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```
          files: |
            happy-cli-${{ needs.prepare.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
            happy-cli-${{ needs.prepare.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.zip
          fail_on_unmatched_files: false  # 每个 job 只匹配自己平台的文件，正常
