# Gitea Actions — Release happy-server Docker image
#
# Trigger: push a tag of the form `happy-server-vX.Y.Z`.
#
# Output:
#   - open-1.kfafa.cn:30011/claude-relay/happy-server:vX.Y.Z   (versioned)
#   - open-1.kfafa.cn:30011/claude-relay/happy-server:latest   (moving)
#   - open-1.kfafa.cn:30011/claude-relay/happy-server:<sha>    (immutable digest tag)
#
# Multi-arch: linux/amd64 + linux/arm64 via buildx.
#
# Secrets:
#   - DOCKER_REGISTRY_USER     : registry account name
#   - DOCKER_REGISTRY_PASSWORD : registry password (or robot token)
#   - RELEASE_TOKEN            : Gitea PAT used to create the Release record

name: Release happy-server

on:
  push:
    tags:
      - "happy-server-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (without the v prefix)"
        required: true
        type: string

concurrency:
  group: release-happy-server-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: open-1.kfafa.cn:30011
  IMAGE_PATH: claude-relay/happy-server

jobs:
  release:
    runs-on: test
    steps:
      - name: Derive version
        id: derive
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="happy-server-v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#happy-server-v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_base=${{ env.REGISTRY }}/${{ env.IMAGE_PATH }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU (for arm64 emulation when runner is amd64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ steps.derive.outputs.image_base }}"
          VERSION="${{ steps.derive.outputs.version }}"
          SHA="${GITHUB_SHA::12}"
          TAGS="${BASE}:v${VERSION},${BASE}:latest,${BASE}:sha-${SHA}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Image tags: ${TAGS}"

      - name: Build & push happy-server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=happy-server
            org.opencontainers.image.version=${{ steps.derive.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          # buildx layer cache lives in the runner cache for incremental rebuilds.
          cache-from: type=gha,scope=happy-server
          cache-to: type=gha,scope=happy-server,mode=max

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.derive.outputs.tag }}"
          VERSION="${{ steps.derive.outputs.version }}"
          BASE="${{ steps.derive.outputs.image_base }}"
          PREV=$(git tag --list 'happy-server-v*' --sort=-v:refname \
                 | grep -v "^${TAG}$" | head -n1 || true)
          {
            echo "# happy-server ${VERSION}"
            echo ""
            echo "## Docker image"
            echo ""
            echo '```bash'
            echo "docker pull ${BASE}:v${VERSION}"
            echo "# or"
            echo "docker pull ${BASE}:latest"
            echo '```'
            echo ""
            echo "**Supported platforms**: linux/amd64, linux/arm64"
            echo ""
            if [ -n "$PREV" ]; then
              echo "## Changes since ${PREV}"
              echo ""
              git log "${PREV}..${TAG}" \
                --pretty=format:"- %s (%h)" \
                -- packages/happy-server Dockerfile.server || true
            else
              echo "First release."
            fi
          } > NOTES.md

      - name: Create Gitea Release (metadata only — image lives in registry)
        uses: https://gitea.com/actions/release-action@main
        with:
          api_key: ${{ secrets.RELEASE_TOKEN }}
          name: "${{ steps.derive.outputs.tag }}"
          tag_name: "${{ steps.derive.outputs.tag }}"
          body_path: NOTES.md
