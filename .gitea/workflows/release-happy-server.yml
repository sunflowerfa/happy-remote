# Gitea Actions — Release happy-server Docker image
#
# Trigger: push a tag of the form `happy-server-vX.Y.Z`.
#
# Output:
#   - open-1.kfafa.cn:30011/claude-relay/happy-server:vX.Y.Z   (versioned)
#   - open-1.kfafa.cn:30011/claude-relay/happy-server:latest   (moving)
#   - open-1.kfafa.cn:30011/claude-relay/happy-server:<sha>    (immutable digest tag)
#
# Multi-arch: linux/amd64 + linux/arm64 via buildx.
#
# Secrets:
#   - DOCKER_REGISTRY_USER     : registry account name
#   - DOCKER_REGISTRY_PASSWORD : registry password (or robot token)
#   - RELEASE_TOKEN            : Gitea PAT used to create the Release record

name: Release happy-server

on:
  push:
    tags:
      - "happy-server-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (without the v prefix)"
        required: true
        type: string

concurrency:
  group: release-happy-server-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: open-1.kfafa.cn:30011
  IMAGE_PATH: claude-relay/happy-server

jobs:
  release:
    runs-on: test
    steps:
      - name: Derive version
        id: derive
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="happy-server-v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#happy-server-v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_base=${{ env.REGISTRY }}/${{ env.IMAGE_PATH }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU (for arm64 emulation when runner is amd64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ steps.derive.outputs.image_base }}"
          VERSION="${{ steps.derive.outputs.version }}"
          SHA="${GITHUB_SHA::12}"
          TAGS="${BASE}:v${VERSION},${BASE}:latest,${BASE}:sha-${SHA}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Image tags: ${TAGS}"

      - name: Build & push happy-server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.server
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=happy-server
            org.opencontainers.image.version=${{ steps.derive.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          # NOTE: GHA cache (type=gha) deliberately disabled —
          # act_runner 内置 cache server (172.18.0.x:xxxxx) 从 buildx 容器不可达，
          # 会在 cache export 阶段超时失败。每次全量构建，amd64-only 约 2-3 分钟可接受。

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.derive.outputs.tag }}"
          VERSION="${{ steps.derive.outputs.version }}"
          BASE="${{ steps.derive.outputs.image_base }}"
          PREV=$(git tag --list 'happy-server-v*' --sort=-v:refname \
                 | grep -v "^${TAG}$" | head -n1 || true)
          {
            echo "# happy-server ${VERSION}"
            echo ""
            echo "## Docker image"
            echo ""
            echo '```bash'
            echo "docker pull ${BASE}:v${VERSION}"
            echo "# or"
            echo "docker pull ${BASE}:latest"
            echo '```'
            echo ""
            echo "**Supported platforms**: linux/amd64"
            echo ""
            if [ -n "$PREV" ]; then
              echo "## Changes since ${PREV}"
              echo ""
              git log "${PREV}..${TAG}" \
                --pretty=format:"- %s (%h)" \
                -- packages/happy-server Dockerfile.server || true
            else
              echo "First release."
            fi
          } > NOTES.md

      - name: Create Gitea Release (metadata only — image lives in registry)
        # 不用 https://gitea.com/actions/release-action（go-based 二进制，
        # act_runner 默认容器里没装 go，会报 "go: executable file not found"）。
        # 直接调 Gitea API：POST /api/v1/repos/{owner}/{repo}/releases
        shell: bash
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GITEA_API: ${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases
          TAG: ${{ steps.derive.outputs.tag }}
        run: |
          set -euo pipefail
          # 构造 JSON payload：jq 优先，缺则 python3 fallback
          if command -v jq >/dev/null 2>&1; then
            jq -n --arg tag "$TAG" --rawfile body NOTES.md \
              '{tag_name: $tag, name: $tag, body: $body}' > payload.json
          else
            python3 -c 'import json, os, pathlib; pathlib.Path("payload.json").write_text(json.dumps({"tag_name": os.environ["TAG"], "name": os.environ["TAG"], "body": pathlib.Path("NOTES.md").read_text()}))'
          fi
          curl -fsSL -X POST \
            -H "Authorization: token ${RELEASE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "${GITEA_API}"
