# nginx 反向代理：https://open-1.kfafa.cn:33333 -> happy-server:3005
# 证书路径（容器内）：
#   /etc/nginx/certs/fullchain.pem  <- 宿主 /home/sunflowerfa/cert/fullchain.pem
#   /etc/nginx/certs/privkey.pem    <- 宿主 /home/sunflowerfa/cert/privkey.pem
#
# 想改证书位置只需改 docker-compose.yml 里的 volumes 挂载即可，无需动这里。

# Socket.IO / WebSocket 必需：根据 Upgrade 头切换 Connection 值
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream happy_backend {
    server happy-server:3005;
    keepalive 64;
}

server {
    listen 33333 ssl;
    http2 on;
    server_name open-1.kfafa.cn;

    # === TLS ===
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 上传附件 / 头像 / 媒体片段，给到 200M 比较保险
    client_max_body_size 200m;
    client_body_buffer_size 1m;

    # === 反代 ===
    location / {
        proxy_pass http://happy_backend;
        proxy_http_version 1.1;

        # WebSocket / Socket.IO 升级
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 透传真实 host / IP / 协议（happy-server 用于生成回调 / 日志）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 33333;

        # 流式响应 / 长轮询 / SSE：关闭缓冲、加长超时
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }
}
